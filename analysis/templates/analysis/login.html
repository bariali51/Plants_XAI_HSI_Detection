{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantGuard AI | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ===== RESET & BASE ===== */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #eef7f0;
    overflow: hidden;
    color: #2d3748;
}

/* ===== SOFT GRADIENT MESH ===== */
.bg {
    position: absolute;
    width: 150vw;
    height: 150vh;
    background:
        radial-gradient(circle at 15% 50%, rgba(165, 214, 167, 0.6), transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(129, 199, 132, 0.5), transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(102, 187, 106, 0.4), transparent 50%);
    animation: move 20s infinite alternate ease-in-out;
    z-index: 1;
}

@keyframes move {
    0% { transform: translate(-5%, -5%) scale(1); }
    100% { transform: translate(5%, 5%) scale(1.05); }
}

/* ===== TRUE GLASS CARD ===== */
.card {
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px); /* Safari support */
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
    text-align: center;
    position: relative;
    z-index: 5;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== TYPOGRAPHY ===== */
.logo {
    font-size: 28px;
    font-weight: 800;
    color: #1b5e20;
    letter-spacing: -0.5px;
}

.subtitle {
    margin-top: 8px;
    color: #64748b;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 32px;
}

/* ===== INPUTS ===== */
.input-group {
    margin-bottom: 16px;
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: 1.5px solid rgba(255, 255, 255, 0.8);
    background: rgba(255, 255, 255, 0.9);
    font-size: 15px;
    font-family: inherit;
    font-weight: 500;
    color: #1e293b;
    transition: all 0.3s ease;
}

input::placeholder {
    color: #94a3b8;
    font-weight: 400;
}

input:focus {
    outline: none;
    border-color: #43a047;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(67, 160, 71, 0.15);
    transform: translateY(-2px);
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    margin-top: 12px;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2e7d32, #43a047);
    color: white;
    font-family: inherit;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(46, 125, 50, 0.35);
}

button:active {
    transform: translateY(1px);
}

/* ===== ERROR & LINKS ===== */
.error {
    background: rgba(254, 226, 226, 0.8);
    color: #dc2626;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-top: -4px;
    margin-bottom: 16px;
    border: 1px solid #fca5a5;
    animation: shake 0.4s ease-in-out;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
}

.link {
    margin-top: 24px;
    font-size: 14px;
    color: #64748b;
    font-weight: 500;
}

.link a {
    color: #2e7d32;
    text-decoration: none;
    font-weight: 700;
    transition: color 0.2s;
}

.link a:hover {
    color: #1b5e20;
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <div class="logo">🌿 PlantGuard AI</div>
    <div class="subtitle">Smart Plant Disease Detection Platform</div>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
        </div>
        
        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
        </div>

        {% if form.errors %}
        <div class="error">Invalid username or password</div>
        {% endif %}

        <button type="submit">Login to Dashboard</button>
    </form>

    <div class="link">
        Don't have an account? 
        <a href="{% url 'signup' %}">Create one</a>
    </div>
</div>

</body>
</html>
